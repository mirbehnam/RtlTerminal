name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Set release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "1.0.${{ github.run_number }}"
          }

          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Publish standalone executable
        shell: pwsh
        run: |
          dotnet publish RtlTerminal.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishTrimmed=false `
            --output publish/win-x64

      - name: Create release package
        shell: pwsh
        run: |
          Copy-Item publish/win-x64/RtlTerminal.exe `
            "RtlTerminal-${{ steps.version.outputs.version }}-win-x64.exe"

          Compress-Archive `
            -Path publish/win-x64/RtlTerminal.exe `
            -DestinationPath "RtlTerminal-${{ steps.version.outputs.version }}-win-x64.zip"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"

          if (-not (Test-Path $iscc)) {
            throw "Inno Setup compiler was not found at $iscc"
          }

          & $iscc `
            "/DAppVersion=${{ steps.version.outputs.version }}" `
            "installer\RtlTerminal.iss"

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: RtlTerminal-${{ steps.version.outputs.version }}-win-x64
          path: |
            RtlTerminal-${{ steps.version.outputs.version }}-win-x64.exe
            RtlTerminal-${{ steps.version.outputs.version }}-win-x64.zip
            release/RtlTerminal-Setup-${{ steps.version.outputs.version }}-x64.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          name: Rtl Terminal ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Rtl Terminal ${{ github.ref_name }}

            ### Changes
            - Added the official GitHub repository link to the terminal welcome message.
            - Fixed opening blue links with Ctrl + Click.
            - Added an automatic standalone Windows x64 build.
            - Added an automatic Windows Setup installer with uninstall support.

            ### Downloads
            - `RtlTerminal-${{ steps.version.outputs.version }}-win-x64.exe`: standalone portable executable
            - `RtlTerminal-${{ steps.version.outputs.version }}-win-x64.zip`: compressed portable executable
            - `RtlTerminal-Setup-${{ steps.version.outputs.version }}-x64.exe`: Windows installer
          files: |
            RtlTerminal-${{ steps.version.outputs.version }}-win-x64.exe
            RtlTerminal-${{ steps.version.outputs.version }}-win-x64.zip
            release/RtlTerminal-Setup-${{ steps.version.outputs.version }}-x64.exe
